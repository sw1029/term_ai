defaults: []

data:
  sft_jsonl: data/sft/judge_validated_train_sft_v1.jsonl
  raw_train_sft_jsonl: data/sft/raw_train_sft_v1.jsonl
  raw_dev_sft_jsonl: data/sft/raw_dev_sft_v1.jsonl
  raw_judge_aug_train_sft_jsonl: data/sft/raw_judge_aug_train_sft_v1.jsonl
  raw_judge_aug_dev_sft_jsonl: data/sft/raw_judge_aug_dev_sft_v1.jsonl
  split_manifest: data/splits/word_split_seed42.json
  augmentation_metadata: data/metadata/aug_judge_pass_v1.jsonl
  strict_judge_metadata: data/metadata/aug_judge_pass_v1.jsonl
  human_approved_metadata: data/metadata/aug_human_pass_v1.jsonl
  kd_metadata: data/metadata/kd_train_view_v1.jsonl
  kd_dev_metadata: data/metadata/kd_dev_view_v1.jsonl
  raw_metadata: data/metadata/raw_mcq_v1.jsonl
  validation_metadata: data/metadata/validation_v1.jsonl
  data_version: raw_v1
  augmentation_version: aug_judge_validated_v1

model:
  matrix_path: experiments/model_matrix.json
  primary_small_models:
    - gemma2 2b
    - qwen2.5 3b
  hf_model_ids:
    gemma2 2b: google/gemma-2-2b-it
    qwen2.5 3b: Qwen/Qwen2.5-3B-Instruct
    G0-Gemma: google/gemma-2-2b-it
    G0-Qwen: Qwen/Qwen2.5-3B-Instruct
    G1-Gemma: google/gemma-2-2b-it
    G1-Qwen: Qwen/Qwen2.5-3B-Instruct
    G2-Gemma: google/gemma-2-2b-it
    G2-Qwen: Qwen/Qwen2.5-3B-Instruct
    G3-Gemma: google/gemma-2-2b-it
    G3-Qwen: Qwen/Qwen2.5-3B-Instruct
  experiment_id: B0

execution:
  run: false
  output_dir: runs/hydra_run
  metadata: null
  min_status: null
  raw_metadata: data/metadata/raw_mcq_v1.jsonl
  strict_judge_metadata: data/metadata/aug_judge_pass_v1.jsonl
  human_approved_metadata: data/metadata/aug_human_pass_v1.jsonl
  kd_metadata: data/metadata/kd_train_view_v1.jsonl
  kd_dev_metadata: data/metadata/kd_dev_view_v1.jsonl
  train_sft_jsonl: null
  dev_sft_jsonl: null
  train_metadata: null
  primary_predictions: null
  cross_encoder_predictions: null
  fallback_predictions: null
  model_name_or_path: null
  adapter_path: null
  limit: null
  local_cost_per_hour_usd: 0.0
  test_lock_dir: runs/_test_locks
  allow_repeat_test: false
  reranker:
    fine_tune: false
    epochs: 1
    batch_size: 8
    score_normalization: sigmoid
    threshold: null
    threshold_split: dev
  api_recheck:
    provider: openai
    model: gpt-5.4-mini
    env_path: .env
    base_url: null
    api_key_env: null
    pricing_path: null
    requests_per_second: 1.0
    input_cost_per_1m_tokens: 0.0
    output_cost_per_1m_tokens: 0.0
    confidence_threshold: 0.7
  hybrid:
    low_confidence_threshold: 0.4
    high_confidence_threshold: 0.7
    tune_policy: false
    threshold_grid:
      - 0.3
      - 0.4
      - 0.5
      - 0.6
      - 0.7
      - 0.8
    primary_cost_per_1000: 0.0
    cross_encoder_cost_per_1000: 0.0
    fallback_cost_per_1000: 0.0

training:
  framework: pytorch
  sft_method: lora
  resume: true
  weight_backup: true
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
  kd:
    enabled: false
    lambda_soft: 0.5
    mu_margin: 0.2
    require_teacher_scores: true
    include_rationale: true
    response_format: json_distribution
  quantization:
    compare_same_checkpoint: true
    require_g3_manifest: true
    modes:
      - fp16
      - 8bit
      - 4bit

evaluation:
  split: dev
  final_test_once: true
  metrics:
    - Accuracy
    - Macro-F1
    - Class-wise F1
    - ECE
    - Brier Score
    - Bootstrap 95% CI
    - latency_p50
    - latency_p95
    - tokens_per_sec
    - peak_VRAM_or_RAM
    - cost_per_1000_questions
    - fallback_rate
    - parse_error_rate

logging:
  runs_dir: runs
  metric_log: metric_log.json
  prediction_log: prediction_log.jsonl
  checkpoint_dir: checkpoints
  backup_dir: backups

reproducibility:
  seed: 42
  split_version: word_split_seed42
  prompt_version: aug_prompt_v1
  config_snapshot: true

workflow:
  master_enabled: false
  execute_expensive_steps: false
  config:
    runs_dir: runs
    model_matrix: experiments/model_matrix.json
    report_dir: reports
    data:
      input_path: pharaprased_voca.jsonl
      output_dir: data
      seed: 42
    augmentation:
      enabled: false
      total: 0
      split_totals:
        train: 0
        dev: 0
        test: 0
      model: gpt-5.4-mini
      env_path: .env
      requests_per_second: 1.0
      candidate_path_template: data/aug/{split}_aug_candidate_v1.jsonl
      auto_filter_path_template: data/aug/{split}_aug_auto_pass_v1.jsonl
      judge:
        enabled: false
        model: gpt-5.4-mini
        reasoning_effort: null
        env_path: .env
        requests_per_second: 1.0
        enforce_model_separation: true
        output_path_template: data/judge/{split}_judge_v1.jsonl
        metadata_path_template: data/metadata/{split}_aug_judge_pass_v1.jsonl
    strict_judge_metadata: null
    raw_teacher_scores: null
    auto_phase_jobs:
      enabled: true
      output_dir: runs/master_matrix
      eval_split: dev
      include_baselines: true
      include_zero_shot: true
      include_lora_sft: true
      include_lora_kd: true
      include_quantization: true
      include_hybrid: true
      g4_source_experiment: G3-Gemma
      prompt_variation:
        enabled: true
        train_jsonl: data/sft/raw_judge_aug_train_sft_v1.jsonl
        dev_jsonl: data/sft/raw_judge_aug_dev_sft_v1.jsonl
        eval_metadata: data/metadata/raw_mcq_v1.jsonl
        execute_training: true
      kd_ablation:
        enabled: true
        metadata_jsonl: data/metadata/kd_train_view_v1.jsonl
        dev_metadata_jsonl: data/metadata/kd_dev_view_v1.jsonl
        eval_metadata: data/metadata/raw_mcq_v1.jsonl
        execute_training: true
      model_ids:
        gemma: google/gemma-2-2b-it
        qwen: Qwen/Qwen2.5-3B-Instruct
    explanation_judge:
      enabled: false
      judge_model: null
      generator_model: null
      env_path: .env
      requests_per_second: 1.0
      enforce_model_separation: true
      prediction_logs: []
      output_dir: runs/explanation_judge
    phase_jobs: []
